# Golden set — known-answer engineering problems in Jack's domains.
# Grader is trusted arithmetic (helpers/truth.py + Pint), never a model.
# Extend by adding entries: id, domain, prompt, answer, unit, tolerance (rel),
# source. Frontier-generated problems can be dropped in here later.

- id: GOLD-ohm-01
  domain: ohms_law
  prompt: "A 12 V battery is connected across a 4 ohm resistor. What current flows?"
  answer: 3
  unit: ampere
  tolerance: 0.02
  source: verified-by-hand (I = V/R = 12/4)

- id: GOLD-ohm-02
  domain: ohms_law
  prompt: "A resistor drops 5 V while carrying 0.25 A. What is its resistance?"
  answer: 20
  unit: ohm
  tolerance: 0.02
  source: verified-by-hand (R = V/I = 5/0.25)

- id: GOLD-pwr-01
  domain: power
  prompt: "A motor draws 2.5 A at 24 V. What electrical power does it consume?"
  answer: 60
  unit: watt
  tolerance: 0.02
  source: verified-by-hand (P = VI = 24*2.5)

- id: GOLD-energy-01
  domain: power
  prompt: "A 40 W load runs continuously for 90 minutes. How much energy does it use?"
  answer: 60
  unit: watt_hour
  tolerance: 0.02
  source: verified-by-hand (40 W * 1.5 h = 60 Wh) - MINUTES TRAP

- id: GOLD-energy-02
  domain: power
  prompt: "A sensor consumes 2 W continuously for 3 days. Energy used, in watt-hours?"
  answer: 144
  unit: watt_hour
  tolerance: 0.02
  source: verified-by-hand (2 W * 72 h)

- id: GOLD-conv-01
  domain: conversion
  prompt: "Convert 2.5 inches to millimeters."
  answer: 63.5
  unit: millimeter
  tolerance: 0.01
  source: verified-by-hand (25.4 mm/in)

- id: GOLD-conv-02
  domain: conversion
  prompt: "A torque is 10 N*m. Express it in inch-pounds (force)."
  answer: 88.507
  unit: pound_force*inch
  tolerance: 0.02
  source: Pint (10 N*m -> in*lbf); expected unit must be a real Pint unit

- id: GOLD-conv-03
  domain: conversion
  prompt: "Convert 60 km/h to meters per second."
  answer: 16.667
  unit: meter/second
  tolerance: 0.01
  source: verified-by-hand (60/3.6)

- id: GOLD-gear-01
  domain: gear
  prompt: "A motor outputs 0.5 N*m through a 15:1 reduction at 100% efficiency. Output torque?"
  answer: 7.5
  unit: N*m
  tolerance: 0.02
  source: verified-by-hand (0.5*15)

- id: GOLD-gear-02
  domain: gear
  prompt: "A 3000 rpm motor drives a 15:1 reduction. What is the output shaft speed?"
  answer: 200
  unit: rpm
  tolerance: 0.02
  source: verified-by-hand (3000/15)

- id: GOLD-gear-03
  domain: gear
  prompt: "A motor gives 0.65 N*m through a 20:1 gearbox at 80% efficiency. Output torque?"
  answer: 10.4
  unit: N*m
  tolerance: 0.02
  source: verified-by-hand (0.65*20*0.8)

- id: GOLD-buoy-01
  domain: buoyancy
  prompt: "What is the buoyant force on a 0.01 m^3 fully-submerged object in fresh water (rho=1000, g=9.81)?"
  answer: 98.1
  unit: newton
  tolerance: 0.02
  source: verified-by-hand (rho*V*g)

- id: GOLD-buoy-02
  domain: buoyancy
  prompt: "A float displaces 2 liters of seawater (rho=1025 kg/m^3, g=9.81). Buoyant force?"
  answer: 20.11
  unit: newton
  tolerance: 0.03
  source: verified-by-hand (1025*0.002*9.81)

- id: GOLD-stat-01
  domain: statics
  prompt: "What downward force does a 5 kg mass exert under gravity (g=9.81)?"
  answer: 49.05
  unit: newton
  tolerance: 0.02
  source: verified-by-hand (mg)

- id: GOLD-stat-02
  domain: statics
  prompt: "A 200 N force acts on a 0.15 m moment arm, perpendicular. What is the moment?"
  answer: 30
  unit: N*m
  tolerance: 0.02
  source: verified-by-hand (F*d)

- id: GOLD-budget-01
  domain: power
  prompt: "A 30 W winch runs 5 minutes per cycle, 6 cycles per day. Daily winch energy in watt-hours?"
  answer: 15
  unit: watt_hour
  tolerance: 0.02
  source: verified-by-hand (30 W * 0.5 h/day) - MINUTES TRAP

- id: GOLD-budget-02
  domain: power
  prompt: "Battery of 100 Wh runs a steady 8 W load. How many hours until empty?"
  answer: 12.5
  unit: hour
  tolerance: 0.02
  source: verified-by-hand (100/8)

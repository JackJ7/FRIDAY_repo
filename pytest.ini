[pytest]
testpaths = tests
python_files = test_*.py
markers =
    case(id, desc): stable case ID + one-line description (report key)
    model: needs the live local LLM (slow; excluded by --quick)
# Quiet Hypothesis's function-scoped-fixture note (our session sandbox is intentional)
filterwarnings =
    ignore::hypothesis.errors.HypothesisWarning
addopts = -p no:cacheprovider
